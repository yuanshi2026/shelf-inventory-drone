# task2_routes.yaml
# 第二问：定点巡查航线配置。
# use_relative=true 时，x/y/z 是相对起飞区 home 点的 local 坐标偏移；yaw 直接使用 YAML 中的目标 yaw。
# 任务2默认从起飞区重新起飞，最后到右上角降落区上方，再由 /uav/land 执行 AUTO.LAND。

task2_routes:
  use_relative: true

  # 起飞高度，参考任务1保持 1.50m 附近
  takeoff_height: 1.50

  arrive_pos_eps: 0.15
  arrive_z_eps: 0.10
  arrive_yaw_eps_deg: 10.0

  kp_xy: 0.40
  kp_z: 0.45
  kp_yaw: 0.55
  max_vel_xy: 0.18
  max_vel_z: 0.12
  max_yaw_rate: 0.35

  # 视觉对齐参数；848x480 时图像中心约为 424,240
  laser_u: 424.0
  laser_v: 240.0
  align_pixel_eps: 25.0
  align_kp_u: 0.0008
  align_kp_v: 0.0008
  max_align_vel_y: 0.08
  max_align_vel_z: 0.06

  search_timeout: 3.0
  align_timeout: 4.0
  verify_timeout: 1.0
  qr_fresh_timeout: 0.8
  land_finish_timeout: 45.0

  # 右上角黑色圆形降落区上方，复用任务1 land 点
  land: {x: 3.25, y: 2.25, z: 0.50, yaw: 0.0}

  # 从起飞区到目标面的中间安全航点。
  # 设计原则：先走下方安全通道，再到目标面外侧；转向尽量在 safe 点原地完成。
  routes_to_face:
    A:
      - {x: 0.00, y: 0.25, z: 1.50, yaw: 0.0}
      - {x: 0.30, y: 0.25, z: 1.30, yaw: 0.0}

    B:
      - {x: 0.00, y: 0.25, z: 1.50, yaw: 0.0}
      - {x: 0.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 1.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 1.20, y: 0.25, z: 1.30, yaw: 3.1416}

    C:
      - {x: 0.00, y: 0.25, z: 1.50, yaw: 0.0}
      - {x: 0.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 1.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 2.30, y: 0.25, z: 1.30, yaw: 0.0}

    D:
      - {x: 0.00, y: 0.25, z: 1.50, yaw: 0.0}
      - {x: 0.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 1.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 2.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.20, y: 0.25, z: 1.30, yaw: 3.1416}

  # 扫完后退出目标面，回到下方安全通道，再去降落区上方。
  routes_from_face:
    A:
      - {x: 0.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 1.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 2.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.25, y: 2.25, z: 0.50, yaw: 0.0}

    B:
      - {x: 1.20, y: 0.25, z: 1.30, yaw: 3.1416}
      - {x: 1.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 2.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.25, y: 2.25, z: 0.50, yaw: 0.0}

    C:
      - {x: 2.30, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.25, y: 2.25, z: 0.50, yaw: 0.0}

    D:
      - {x: 3.20, y: 0.25, z: 1.30, yaw: 3.1416}
      - {x: 3.20, y: 0.25, z: 1.30, yaw: 0.0}
      - {x: 3.25, y: 2.25, z: 0.50, yaw: 0.0}

  # A1~D6 大致扫码点，复用任务1航点。
  # yaw=0.0 面向 +X；yaw=3.1416 面向 -X。
  scan_points:
    A1: {x: 0.30, y: 0.75, z: 1.40, yaw: 0.0}
    A2: {x: 0.30, y: 1.25, z: 1.40, yaw: 0.0}
    A3: {x: 0.30, y: 1.75, z: 1.40, yaw: 0.0}
    A4: {x: 0.30, y: 0.75, z: 1.00, yaw: 0.0}
    A5: {x: 0.30, y: 1.25, z: 1.00, yaw: 0.0}
    A6: {x: 0.30, y: 1.75, z: 1.00, yaw: 0.0}

    B1: {x: 1.20, y: 0.75, z: 1.40, yaw: 3.1416}
    B2: {x: 1.20, y: 1.25, z: 1.40, yaw: 3.1416}
    B3: {x: 1.20, y: 1.75, z: 1.40, yaw: 3.1416}
    B4: {x: 1.20, y: 0.75, z: 1.00, yaw: 3.1416}
    B5: {x: 1.20, y: 1.25, z: 1.00, yaw: 3.1416}
    B6: {x: 1.20, y: 1.75, z: 1.00, yaw: 3.1416}

    C1: {x: 2.30, y: 0.75, z: 1.40, yaw: 0.0}
    C2: {x: 2.30, y: 1.25, z: 1.40, yaw: 0.0}
    C3: {x: 2.30, y: 1.75, z: 1.40, yaw: 0.0}
    C4: {x: 2.30, y: 0.75, z: 1.00, yaw: 0.0}
    C5: {x: 2.30, y: 1.25, z: 1.00, yaw: 0.0}
    C6: {x: 2.30, y: 1.75, z: 1.00, yaw: 0.0}

    D1: {x: 3.20, y: 0.75, z: 1.40, yaw: 3.1416}
    D2: {x: 3.20, y: 1.25, z: 1.40, yaw: 3.1416}
    D3: {x: 3.20, y: 1.75, z: 1.40, yaw: 3.1416}
    D4: {x: 3.20, y: 0.75, z: 1.00, yaw: 3.1416}
    D5: {x: 3.20, y: 1.25, z: 1.00, yaw: 3.1416}
    D6: {x: 3.20, y: 1.75, z: 1.00, yaw: 3.1416}
