mission:
  # 是否使用起飞点作为相对坐标原点
  use_relative: true

  # 起飞高度，题目要求 150 ± 10 cm
  takeoff_height: 1.50
  
  # 相机起飞前离地高度，单位 m
  # 例如：YAML 写 1.50m，但相机实际到 1.65m，说明相机初始离地约 0.15m
  camera_initial_height: 0.15

  # 到达航点的误差阈值
  arrive_pos_eps: 0.15
  arrive_z_eps: 0.10
  arrive_yaw_eps_deg: 10.0

  # P 控制参数
  kp_xy: 0.45
  kp_z: 0.55
  kp_yaw: 0.60

  # 速度限幅
  max_vel_xy: 0.25
  max_vel_z: 0.18
  max_yaw_rate: 0.40

  # 激光点在图像中的像素坐标
  laser_u: 320
  laser_v: 240

  # 二维码中心与激光点的允许像素误差
  align_pixel_eps: 25

  # 视觉对准参数
  align_kp_u: 0.0008
  align_kp_v: 0.0008
  max_align_vel_y: 0.10
  max_align_vel_z: 0.08

  # 超时与激光点亮时间
  align_timeout: 4.0
  laser_flash_time: 0.5
  ack_timeout: 0.4

  # 扫码点稳定参数：不降低巡航速度，只是在扫码前确认机体停稳
  scan_pre_hover_time: 2.0
  scan_pre_hover_timeout: 3.0
  settle_vel_xy_eps: 0.05
  settle_vel_z_eps: 0.04
  settle_yaw_rate_eps: 0.12

  # 正式扫码等待时长；此阶段只原地等待二维码，不做横移/升降小搜索
  search_timeout: 3.0

  # 降落点；相对起飞点，约对应题图右上角黑色圆形区域
  land:
    x: 3.25
    y: 2.25
    z: 0.5
    yaw: 0.0

  # type=safe 表示安全过渡点；type=scan 表示盘点点
  # yaw=0.0 面向赛场 +X；yaw=3.1416 面向赛场 -X
  points:
    # 起飞后进入左货架下方安全通道
    - {type: safe, x: 0.00, y: 0.25, z: 1.50, yaw: 0.0}
    - {type: safe, x: 0.30, y: 0.25, z: 1.50, yaw: 0.0}

    # A 面：左货架左侧
    - {type: scan, face: A, slot: 1, x: 0.30, y: 0.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: A, slot: 2, x: 0.30, y: 1.25, z: 1.40, yaw: 0.0}
    - {type: scan, face: A, slot: 3, x: 0.30, y: 1.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: A, slot: 6, x: 0.30, y: 1.75, z: 1.00, yaw: 0.0}
    - {type: scan, face: A, slot: 5, x: 0.30, y: 1.25, z: 1.00, yaw: 0.0}
    - {type: scan, face: A, slot: 4, x: 0.30, y: 0.75, z: 1.00, yaw: 0.0}

    # ==================== 本次修改：A 面到 B 面，先移动，后原地转向 ====================
    - {type: safe, x: 0.30, y: 0.25, z: 1.30, yaw: 0.0}
    - {type: safe, x: 1.20, y: 0.25, z: 1.30, yaw: 0.0}
    - {type: safe, x: 1.20, y: 0.25, z: 1.30, yaw: 3.1416}

    # B 面：左货架右侧
    - {type: scan, face: B, slot: 4, x: 1.20, y: 0.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: B, slot: 5, x: 1.20, y: 1.25, z: 1.00, yaw: 3.1416}
    - {type: scan, face: B, slot: 6, x: 1.20, y: 1.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: B, slot: 3, x: 1.20, y: 1.75, z: 1.40, yaw: 3.1416}
    - {type: scan, face: B, slot: 2, x: 1.20, y: 1.25, z: 1.40, yaw: 3.1416}
    - {type: scan, face: B, slot: 1, x: 1.20, y: 0.75, z: 1.40, yaw: 3.1416}

    # ==================== 本次修改：B 面到 C 面，先退出，后原地转向，再横移 ====================
    - {type: safe, x: 1.20, y: 0.25, z: 1.30, yaw: 3.1416}
    - {type: safe, x: 1.20, y: 0.25, z: 1.30, yaw: 0.0}
    - {type: safe, x: 2.30, y: 0.25, z: 1.30, yaw: 0.0}

    # C 面：右货架左侧
    - {type: scan, face: C, slot: 1, x: 2.30, y: 0.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: C, slot: 2, x: 2.30, y: 1.25, z: 1.40, yaw: 0.0}
    - {type: scan, face: C, slot: 3, x: 2.30, y: 1.75, z: 1.40, yaw: 0.0}
    - {type: scan, face: C, slot: 6, x: 2.30, y: 1.75, z: 1.00, yaw: 0.0}
    - {type: scan, face: C, slot: 5, x: 2.30, y: 1.25, z: 1.00, yaw: 0.0}
    - {type: scan, face: C, slot: 4, x: 2.30, y: 0.75, z: 1.00, yaw: 0.0}

    # ==================== 本次修改：C 面到 D 面，先移动，后原地转向 ====================
    - {type: safe, x: 2.30, y: 0.25, z: 1.30, yaw: 0.0}
    - {type: safe, x: 3.20, y: 0.25, z: 1.30, yaw: 0.0}
    - {type: safe, x: 3.20, y: 0.25, z: 1.30, yaw: 3.1416}

    # D 面：右货架右侧
    - {type: scan, face: D, slot: 4, x: 3.20, y: 0.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: D, slot: 5, x: 3.20, y: 1.25, z: 1.00, yaw: 3.1416}
    - {type: scan, face: D, slot: 6, x: 3.20, y: 1.75, z: 1.00, yaw: 3.1416}
    - {type: scan, face: D, slot: 3, x: 3.20, y: 1.75, z: 1.40, yaw: 3.1416}
    - {type: scan, face: D, slot: 2, x: 3.20, y: 1.25, z: 1.40, yaw: 3.1416}
    - {type: scan, face: D, slot: 1, x: 3.20, y: 0.75, z: 1.40, yaw: 3.1416}

    # ==================== 本次修改：D 面结束后，先退出，后原地转回 +X ====================
    - {type: safe, x: 3.20, y: 0.25, z: 1.30, yaw: 3.1416}
    - {type: safe, x: 3.20, y: 0.25, z: 1.30, yaw: 0.0}
